name: Release Desktop Apps

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches APP_VERSION
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(python -c 'from backend.version import APP_VERSION; print(APP_VERSION)')"
          if [[ "${TAG_VERSION}" != "${APP_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match backend/version.py (${APP_VERSION})."
            exit 1
          fi

  build-windows:
    needs: validate-version
    runs-on: windows-2022
    env:
      WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          choco install nsis -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart('v')
          ./scripts/build_windows.ps1 -Version $version

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/release/windows-x64/*

  build-macos:
    needs: validate-version
    runs-on: macos-14
    env:
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install signing certificate
        if: ${{ env.APPLE_CERT_P12_BASE64 != '' && env.APPLE_CERT_PASSWORD != '' }}
        run: |
          echo "${APPLE_CERT_P12_BASE64}" | base64 --decode > /tmp/bms_cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/bms_cert.p12 -k build.keychain -P "${APPLE_CERT_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          IDENTITY="$(security find-identity -v -p codesigning build.keychain | head -n 1 | awk -F'\"' '{print $2}')"
          echo "APPLE_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        env:
          APPLE_SIGN_IDENTITY: ${{ env.APPLE_SIGN_IDENTITY }}
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh "${GITHUB_REF_NAME#v}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/release/macos-universal2/*

  build-linux:
    needs: validate-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 gpg patchelf desktop-file-utils libglib2.0-bin libxkbcommon-x11-0 libegl1 libgl1
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build Linux AppImage
        run: |
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh "${GITHUB_REF_NAME#v}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/release/linux-x64/*

  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare signatures and manifest
        env:
          REPO_SLUG: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"

          NOTES_FILE="release-artifacts/release-notes.md"
          mkdir -p release-artifacts
          if gh api \
            --method POST \
            "repos/${REPO_SLUG}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "${NOTES_FILE}" && [[ -s "${NOTES_FILE}" ]]; then
            echo "Generated release notes from GitHub."
          else
            cat > "${NOTES_FILE}" <<EOF
          ## BMS Dashboard v${VERSION}

          - Reworked startup to a single-window 3D-to-GUI handoff with no reset/flash between loading and main UI.
          - Added a model-first boot sequence with medium cinematic timing and mid-transition chrome cue.
          - Improved startup visual fidelity and stability on both macOS and Windows.
          EOF
          fi

          WINDOWS_SRC="$(find release-artifacts/windows-release -type f -name 'BMSDashboard-windows-x64-setup.exe' | head -n1 || true)"
          MACOS_ZIP_SRC="$(find release-artifacts/macos-release -type f -name 'BMSDashboard-macos-universal2.zip' | head -n1 || true)"
          MACOS_DMG_SRC="$(find release-artifacts/macos-release -type f -name 'BMSDashboard-macos-universal2.dmg' | head -n1 || true)"
          LINUX_SRC="$(find release-artifacts/linux-release -type f -name 'BMSDashboard-linux-x64.AppImage' | head -n1 || true)"

          if [[ -z "${WINDOWS_SRC}" ]]; then
            WINDOWS_SRC="$(find release-artifacts/windows-release -type f -name '*windows-x64-setup.exe' | head -n1 || true)"
          fi
          if [[ -z "${MACOS_ZIP_SRC}" ]]; then
            MACOS_ZIP_SRC="$(find release-artifacts/macos-release -type f -name '*.zip' | head -n1 || true)"
          fi
          if [[ -z "${MACOS_DMG_SRC}" ]]; then
            MACOS_DMG_SRC="$(find release-artifacts/macos-release -type f -name '*.dmg' | head -n1 || true)"
          fi
          if [[ -z "${LINUX_SRC}" ]]; then
            LINUX_SRC="$(find release-artifacts/linux-release -type f -name '*.AppImage' | head -n1 || true)"
          fi

          if [[ -z "${WINDOWS_SRC}" || -z "${MACOS_ZIP_SRC}" || -z "${MACOS_DMG_SRC}" || -z "${LINUX_SRC}" ]]; then
            echo "Missing one or more build artifacts."
            ls -R release-artifacts || true
            exit 1
          fi

          UPLOAD_DIR="release-artifacts/upload"
          mkdir -p "${UPLOAD_DIR}"

          WINDOWS_FILE="${UPLOAD_DIR}/BMSDashboard-windows-x64-setup.exe"
          MACOS_FILE="${UPLOAD_DIR}/BMSDashboard-macos-universal2.zip"
          MACOS_DMG_FILE="${UPLOAD_DIR}/BMSDashboard-macos-universal2.dmg"
          LINUX_FILE="${UPLOAD_DIR}/BMSDashboard-linux-x64.AppImage"

          cp -f "${WINDOWS_SRC}" "${WINDOWS_FILE}"
          cp -f "${MACOS_ZIP_SRC}" "${MACOS_FILE}"
          cp -f "${MACOS_DMG_SRC}" "${MACOS_DMG_FILE}"
          cp -f "${LINUX_SRC}" "${LINUX_FILE}"

          WIN_SIG=""
          MAC_SIG=""
          LINUX_SIG=""
          if [[ -n "${LINUX_GPG_PRIVATE_KEY}" && -n "${LINUX_GPG_PASSPHRASE}" ]]; then
            echo "${LINUX_GPG_PRIVATE_KEY}" | gpg --batch --import
            KEY_ID="$(gpg --list-secret-keys --keyid-format LONG | awk '/^sec/{print $2}' | head -n1 | sed 's#.*\\/##')"
            if [[ -n "${KEY_ID}" ]]; then
              WIN_SIG="${WINDOWS_FILE}.sig"
              MAC_SIG="${MACOS_FILE}.sig"
              LINUX_SIG="${LINUX_FILE}.sig"
              gpg --batch --yes --pinentry-mode loopback --passphrase "${LINUX_GPG_PASSPHRASE}" --local-user "${KEY_ID}" --output "${WIN_SIG}" --detach-sign "${WINDOWS_FILE}"
              gpg --batch --yes --pinentry-mode loopback --passphrase "${LINUX_GPG_PASSPHRASE}" --local-user "${KEY_ID}" --output "${MAC_SIG}" --detach-sign "${MACOS_FILE}"
              gpg --batch --yes --pinentry-mode loopback --passphrase "${LINUX_GPG_PASSPHRASE}" --local-user "${KEY_ID}" --output "${LINUX_SIG}" --detach-sign "${LINUX_FILE}"
            fi
          fi

          ARGS=(
            --output release-artifacts/release-manifest.json
            --version "${VERSION}"
            --channel stable
            --notes-file "${NOTES_FILE}"
            --repo "${REPO_SLUG}"
            --tag "${TAG_NAME}"
            --windows-file "${WINDOWS_FILE}"
            --macos-file "${MACOS_FILE}"
            --linux-file "${LINUX_FILE}"
          )
          if [[ -n "${WIN_SIG}" ]]; then
            ARGS+=(--windows-signature "${WIN_SIG}")
          fi
          if [[ -n "${MAC_SIG}" ]]; then
            ARGS+=(--macos-signature "${MAC_SIG}")
          fi
          if [[ -n "${LINUX_SIG}" ]]; then
            ARGS+=(--linux-signature "${LINUX_SIG}")
          fi
          python scripts/build_release_manifest.py "${ARGS[@]}"

          cp -f release-artifacts/release-manifest.json "${UPLOAD_DIR}/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-artifacts/release-notes.md
          files: |
            release-artifacts/upload/*
