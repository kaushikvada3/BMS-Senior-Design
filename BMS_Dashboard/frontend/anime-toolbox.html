<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime.js Toolbox Demo</title>
    <link rel="stylesheet" href="anime-toolbox.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

    <div class="spacer-top">Scroll Down</div>

    <section id="toolbox" class="home-section-container home-section-light">
        <div class="home-section fixed-section">
            <div class="home-section-content">
                <div class="home-section-text text-layout home-section-text-short">
                    <h2 class="section-heading text-xxl">The complete <br>animator's toolbox</h2>
                    <p class="section-sub-heading">Break free from browser limitations and animate anything on the web with a single API.</p>
                </div>
                <div class="toolbox-labels-container layout-container">
                    <div class="toolbox-labels">
                        <ul class="toolbox-labels-left">
                            <li class="label-item theme-color-timer">timer</li>
                            <li class="label-item theme-color-easings">easings</li>
                            <li class="label-item theme-color-draggable">draggable</li>
                            <li class="label-item theme-color-events">scroll</li>
                            <li class="label-item theme-color-scope">scope</li>
                        </ul>
                        <ul class="toolbox-labels-right">
                            <li class="label-item theme-color-waapi">waapi</li>
                            <li class="label-item theme-color-timeline">timeline</li>
                            <li class="label-item theme-color-utils">stagger</li>
                            <li class="label-item theme-color-svg">svg</li>
                            <li class="label-item theme-color-easings">spring</li>
                            <li class="label-item theme-color-animation">animation</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <!-- Spacers to create scroll distance -->
        <div class="section-spacer"></div>
        <div class="section-spacer"></div>
        <div class="section-spacer"></div>
        <div class="section-spacer"></div>
    </section>

    <div class="spacer-bottom">End of Demo</div>

    <script src="anime-toolbox.js"></script>
</body>
</html>
